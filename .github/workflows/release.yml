name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify version matches tag
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PY_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag: $GIT_TAG"
          echo "package.json: $PKG_VERSION"
          echo "pyproject.toml: $PY_VERSION"
          if [ "$GIT_TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag does not match package.json"
            exit 1
          fi
          if [ "$GIT_TAG" != "$PY_VERSION" ]; then
            echo "ERROR: Tag does not match pyproject.toml"
            exit 1
          fi

      - name: Verify Python package installs
        run: |
          python3 -m venv .test-venv
          .test-venv/bin/pip install -e .
          .test-venv/bin/python -c "from openclaw_docs.cli import cli; print('OK')"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
