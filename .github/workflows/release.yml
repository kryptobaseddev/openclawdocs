name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Changesets Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Node 24 ships npm >= 11.5.1, which is required for npm Trusted
      # Publishing registry auth. npm 10.x (Node 22) only signs Sigstore
      # provenance -- it cannot authenticate to the registry via OIDC,
      # causing a misleading 404 PUT on publish.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm install

      # Changesets action:
      # - If pending changesets: creates a "Version Package" PR
      # - If version PR just merged (no pending changesets): publishes
      #
      # version: runs via `npm run version` (changeset -> vg bump -> sync)
      # publish: bash .github/scripts/publish.sh -- skips if version
      #   already on npm (prevents noisy failures on non-release commits),
      #   otherwise runs `npm publish --access public --provenance`.
      #   Auth: OIDC via npm Trusted Publishing (no NPM_TOKEN needed).
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version package"
          commit: "chore: version package"
          version: npm run version
          publish: bash .github/scripts/publish.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag "v${VERSION}" || true
          git push --tags || true
          gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes || true
