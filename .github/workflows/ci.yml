name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  changeset-check:
    name: Require Changeset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - run: npm install

      - name: Check for changeset
        if: "!startsWith(github.head_ref, 'dependabot/')"
        run: npx changeset status --since=origin/main
