versioning:
  type: calver
  semver:
    allowVPrefix: false
    allowBuildMetadata: true
    requirePrerelease: false
  calver:
    format: YYYY.M.MICRO
    preventFutureDates: true
manifest:
  source: pyproject.toml
sync:
  files:
    - README.md
    - CHANGELOG.md
    - src/openclaw_docs/__init__.py
    # package.json is synced by scripts/version.js (VG regex can't
    # distinguish top-level "version" from scripts.version in JSON)
  patterns:
    # pyproject.toml: version = "X.Y.Z"
    - regex: (version\s*=\s*["'])(.+?)(["'])
      template: $1{{version}}$3
    # Python __init__.py: __version__ = "X.Y.Z"
    - regex: (__version__\s*=\s*["'])(.+?)(["'])
      template: $1{{version}}$3
    # CHANGELOG.md: ## [X.Y.Z]
    - regex: (##\s*\[)(.+?)(\])
      template: $1{{version}}$3
    # NOTE: package.json is synced via `npm version` in scripts/version.js
    # because regex patterns can't distinguish "version" key from scripts.version
changelog:
  enabled: true
  file: CHANGELOG.md
  strict: true
  requireEntry: true
github:
  dependabot: true
scan:
  enabled: true
guard:
  enabled: true
publish:
  enabled: true
  timeout: 5000
git:
  hooks:
    pre-commit: true
    pre-push: true
    post-tag: true
  enforceHooks: true
ignore:
  - node_modules/**
  - dist/**
  - .git/**
  - "*.lock"
  - .changeset/**
  - data/**
  - .venv/**
  - .test-venv/**
