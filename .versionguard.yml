versioning:
  type: calver
  semver:
    allowVPrefix: false
    allowBuildMetadata: true
    requirePrerelease: false
  calver:
    format: YYYY.M.MICRO
    preventFutureDates: true
manifest:
  source: pyproject.toml
sync:
  files:
    - README.md
    - CHANGELOG.md
    - package.json
    - src/openclaw_docs/__init__.py
  patterns:
    - regex: (version\s*[=:]\s*["'])(.+?)(["'])
      template: $1{{version}}$3
    - regex: (##\s*\[)(.+?)(\])
      template: $1{{version}}$3
changelog:
  enabled: true
  file: CHANGELOG.md
  strict: true
  requireEntry: true
github:
  dependabot: true
scan:
  enabled: true
guard:
  enabled: true
publish:
  enabled: true
  timeout: 5000
git:
  hooks:
    pre-commit: true
    pre-push: true
    post-tag: true
  enforceHooks: true
ignore:
  - node_modules/**
  - dist/**
  - .git/**
  - "*.lock"
  - .changeset/**
  - data/**
